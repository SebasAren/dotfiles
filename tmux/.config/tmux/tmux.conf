# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-features ",*:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g update-environment "WAYLAND_DISPLAY"
set -g extended-keys on
set -g extended-keys-format csi-u
# set -g mouse on  # disabled - keyboard-only navigation
setw -g aggressive-resize on

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# --- Splits & new window (Alt, no prefix) ---
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-n new-window -c "#{pane_current_path}"

# --- Pane navigation (Alt+hjkl, no prefix) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Window switching (Alt+number, no prefix) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Reorder windows/panes (Alt, no prefix) ---
bind -n M-< swap-window -t -1\; select-window -t -1
bind -n M-> swap-window -t +1\; select-window -t +1
bind -n 'M-{' swap-pane -U
bind -n 'M-}' swap-pane -D

# --- Layout cycling (Alt+Space, no prefix) ---
bind Space next-layout

# --- Pane zoom & join ---
bind -n M-z resize-pane -Z
bind J choose-window "join-pane -s '%%'"

# --- Pane resizing (Alt+Shift+HJKL, no prefix) ---
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_command 'wl-copy'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'denesbeck/tmux-worktree'

# Theme settings
set -g @theme_variation 'night'

# Bootstrap TPM (auto-install on first run)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
