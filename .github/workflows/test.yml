name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Full verification (format + lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify mise and npm pi versions are in sync
        run: bash .github/scripts/check-version-sync.sh

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install bun dependencies
        working-directory: pi/.pi/agent/extensions
        run: bun install --frozen-lockfile

      - name: Run mise check
        run: mise run check
