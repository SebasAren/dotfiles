services:
  transmission-openvpn:
    container_name: transmission
    image: haugene/transmission-openvpn
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/stash2/media/:/data
      - /var/stash/media/:/data2
      - ./vpn/:/etc/openvpn/custom
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    restart: unless-stopped
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ
      - OPENVPN_PROVIDER
      - OPENVPN_USERNAME
      - OPENVPN_PASSWORD
      - OPENVPN_CONFIG
      - VPN_LOG_LEVEL=11
      - LOCAL_NETWORK
      - WEBPROXY_ENABLED=true
      - WEBPROXY_PORT=8118
      # NOTE: PUID/PGID are required by this image's entrypoint for file ownership.
      # Rootless podman maps host UID 1000 -> container UID 0, so this is safe here.
      - PUID=1000
      - PGID=1000
      - TRANSMISSION_PEER_PORT
      - CREATE_TUN_DEVICE=false
      - TRANSMISSION_WEB_UI=combustion
      - DISABLE_SYSTEMD_RESOLVED=true
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
      - '9091:9091'
      - '8118:8118'
    sysctls:
      - "net.ipv6.conf.all.disable_ipv6=0"
