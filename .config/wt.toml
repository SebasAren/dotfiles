# Worktrunk project config for dotfiles

[pre-start]
mise-trust = "mise trust"
mise-install = "mise install"
luacheck-install = "mise exec -- luarocks install luacheck 2>/dev/null || true"
pi-install = "cd pi/.pi/agent/extensions && bun install"
wpi-install = "cd wt/.local/share/wpi-tui && bun install"

[post-start]
copy = "wt step copy-ignored"

[post-switch]
tmux = "[ -n \"$TMUX\" ] && tmux rename-window {{ branch | sanitize }}"

[pre-commit]
format-check = "scripts/hooks/format-check.sh"

[pre-merge]
typescript-check = "scripts/hooks/typescript-check.sh"
bun-test = "scripts/hooks/bun-test.sh"
lua-lint = "scripts/hooks/lua-lint.sh"
eslint-lint = "scripts/hooks/eslint-lint.sh"
python-lint = "scripts/hooks/python-lint.sh"
