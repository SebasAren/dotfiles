# Code quality watchers for SebbaFlow
# Usage: pitchfork start --all
# Check status: pitchfork logs <name> --raw -n 30

# --- Test runners (native watch mode) ---
# No pitchfork watch — bun test --watch has its own file watcher.
# Pitchfork's watch would restart the whole daemon on every .ts change,
# creating a feedback loop.

[daemons.test]
run = "bun test --watch --parallel --path-ignore-patterns='**/integration.test.ts'"
dir = "pi/.pi/agent/extensions"
auto = ["start", "stop"]

# --- Linters (re-run on change) ---

[daemons.lint-ts]
run = "bash -c 'bunx eslint . --cache && echo ✓ lint-ts passed'"
dir = "pi/.pi/agent/extensions"
watch = ["**/*.ts"]
auto = ["start", "stop"]

[daemons.lint-python]
run = "bash -c 'ruff check . && echo ✓ lint-python passed'"
dir = "."
watch = ["**/*.py"]
auto = ["start", "stop"]

# Disabled: luacheck 1.2.0 is incompatible with Lua 5.5 (const variable assignment error).
# Using selene (Rust-based Lua linter) instead.

[daemons.lint-lua]
run = "bash -c 'selene --config nvim/.config/nvim/selene.toml nvim/.config/nvim/lua/ && echo ✓ lint-lua passed'"
watch = ["nvim/.config/nvim/**/*.lua"]
auto = ["start", "stop"]

[daemons.lint-shell]
run = "bash -c 'shellcheck -e SC1090 -e SC1091 -e SC2155 -e SC2162 -e SC2054 bashrc/.bashrc.d/alias bashrc/.bashrc.d/secrets .githooks/pre-commit .mise/tasks/* && echo ✓ lint-shell passed'"
watch = [
    "bashrc/.bashrc.d/*",
    ".githooks/*",
    ".mise/tasks/*",
]
auto = ["start", "stop"]

# --- Type checking (re-run on change) ---

[daemons.typecheck]
run = "bash -c 'for dir in */; do [ -f \"$dir/tsconfig.json\" ] && echo \"=== $dir ===\" && bunx tsc --noEmit -p \"$dir/tsconfig.json\"; done && echo ✓ typecheck passed'"
dir = "pi/.pi/agent/extensions"
watch = ["**/*.ts"]
auto = ["start", "stop"]

# --- Format check (re-run on change) ---
# All paths kept relative to project root (no ../../) to avoid widening
# the file watch tree beyond the repo, which was causing the supervisor
# to spin at 100% CPU scanning all /proc/*/stat entries.

[daemons.format-check]
run = "bash -c 'prettier --check \"pi/.pi/agent/extensions/**/*.{ts,tsx}\" 2>/dev/null; stylua --check nvim/.config/nvim/ 2>/dev/null; ruff format --check . 2>/dev/null; echo ✓ format-check passed'"
dir = "."
watch = [
    "pi/.pi/agent/extensions/**/*.ts",
    "nvim/.config/nvim/**/*.lua",
    "**/*.py",
]
auto = ["start", "stop"]
